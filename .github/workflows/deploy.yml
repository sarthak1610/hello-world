name: Hello World Pipeline

on: [push]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t hello-world .

      - name: Run Docker Container
        run: docker run -d -p 8080:80 hello-world
